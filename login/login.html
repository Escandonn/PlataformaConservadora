<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Partido Conservador</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        /* Estilos específicos para la página de login, si los necesitas */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #F5F5F5; /* Usamos el gris claro como fondo */
        }
        
        .login-box {
            background-color: #FFFFFF;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-box h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #1A237E;
            margin-bottom: 30px;
        }

        .login-form .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .login-form .form-group label {
            display: block;
            font-size: 0.9rem;
            color: #424242;
            margin-bottom: 5px;
        }

        .login-form .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #E0E0E0;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .login-form .form-group input:focus {
            outline: none;
            border-color: #C9A646;
        }
        
        .login-btn-form {
            width: 100%;
            background-color: #C9A646;
            color: #FFFFFF;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .login-btn-form:hover {
            background-color: #1A237E;
        }

        .forgot-password {
            display: block;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #424242;
        }
        
        .back-home {
            margin-top: 25px;
            display: block;
            color: #1A237E;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <a href="index.html" class="logo">
                <img src="img/logo-partido.png" alt="Logo del Partido Conservador" style="height: 60px; margin-bottom: 20px;">
            </a>
            <h2>Acceso a Miembros</h2>
            <form class="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn-form">Ingresar</button>
            </form>
            <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
            <a href="index.html" class="back-home">← Volver a la página principal</a>
        </div>
    </div>
</body>
</html>
